<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ember & Salt — Wood-Fired Kitchen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ---------------- DATA ---------------- */

const NAV_ITEMS = [
  { href: "#hearth", label: "The Hearth" },
  { href: "#menu", label: "Menu" },
  { href: "#room", label: "The Room" },
  { href: "#reserve", label: "Reserve" },
];

const MENU = {
  "To Begin": [
    { name: "Charred Octopus", desc: "white bean purée, salsa verde, lemon", price: "$19" },
    { name: "Burnt Honey Cornbread", desc: "cultured butter, sea salt", price: "$9" },
    { name: "Smoked Beet Tartare", desc: "goat curd, rye crisps", price: "$14" },
  ],
  "From the Hearth": [
    { name: "Whole Roasted Trout", desc: "embered leeks, brown butter", price: "$28" },
    { name: "Dry-Aged Ribeye, 16oz", desc: "bone marrow butter, charred shallot", price: "$52" },
    { name: "Spatchcocked Chicken", desc: "charred lemon, pan jus", price: "$26" },
    { name: "Wood-Fired Mushroom", desc: "hazelnut romesco, herbs — vegetarian", price: "$22" },
  ],
  "Sides": [
    { name: "Ash-Roasted Potatoes", desc: "rosemary salt", price: "$9" },
    { name: "Charred Broccolini", desc: "chili oil, garlic", price: "$10" },
    { name: "Blistered Shishitos", desc: "flaky salt, lime", price: "$8" },
  ],
  "To Finish": [
    { name: "Burnt Basque Cheesecake", desc: "no crust, all edges", price: "$11" },
    { name: "Smoked Chocolate Tart", desc: "sea salt, crème fraîche", price: "$12" },
    { name: "Rosemary Affogato", desc: "vanilla bean, espresso", price: "$8" },
  ],
  "To Drink": [
    { name: "Ember Old Fashioned", desc: "smoked bourbon, orange", price: "$16" },
    { name: "Applewood Negroni", desc: "smoked gin, campari", price: "$15" },
    { name: "Natural Wine, glass", desc: "ask your server what's pouring", price: "$14" },
  ],
};

const FIRE_FACTS = [
  { icon: "bi-tree", text: "Oak and apple wood, sourced within 60 miles" },
  { icon: "bi-sunrise", text: "Hearth lit at 6am, six mornings a week" },
  { icon: "bi-fire", text: "Every dish on the menu touches the coals" },
];

/* ---------------- COMPONENTS ---------------- */

function EmberParticles({ count = 22 }) {
  const particles = useMemo(() => Array.from({ length: count }).map((_, i) => ({
    id: i,
    left: Math.random() * 100,
    size: 2 + Math.random() * 4,
    duration: 5 + Math.random() * 6,
    delay: Math.random() * 8,
  })), [count]);

  return (
    <div aria-hidden="true">
      {particles.map(p => (
        <div
          key={p.id}
          className="ember-particle"
          style={{
            left: p.left + "%",
            width: p.size + "px",
            height: p.size + "px",
            animationDuration: p.duration + "s",
            animationDelay: p.delay + "s",
          }}
        />
      ))}
    </div>
  );
}

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <nav className={"site-nav" + (scrolled ? " scrolled" : "")}>
      <div className="container d-flex align-items-center justify-content-between">
        <a href="p" className="brand-mark">
          <i className="bi bi-fire"></i> Ember &amp; Salt
        </a>
        <div className="nav-links d-flex">
          {NAV_ITEMS.map(item => (
            <a key={item.href} href={item.href}>{item.label}</a>
          ))}
        </div>
        <div className="nav-toggle-wrap">
          <button className="nav-toggle" onClick={() => setOpen(o => !o)} aria-label="Toggle menu">
            <i className={"bi " + (open ? "bi-x-lg" : "bi-list")}></i>
          </button>
        </div>
      </div>
      <div className={"mobile-panel" + (open ? " open" : "")}>
        {NAV_ITEMS.map(item => (
          <a key={item.href} href={item.href} onClick={() => setOpen(false)}>{item.label}</a>
        ))}
      </div>
    </nav>
  );
}

function Hero() {
  return (
    <header className="hero" id="top">
      <div className="hero-glow"></div>
      <EmberParticles />
      <div className="container hero-content">
        <div className="row">
          <div className="col-lg-9">
            <div className="eyebrow on-dark">Wood, Fire, Patience</div>
            <h1 className="mt-3">Cooked over fire,<br /><em>always.</em></h1>
            <p className="lede">
              A hearth-driven kitchen in the heart of downtown — whole animals, live coals,
              and a menu that changes with the wood pile, not the calendar.
            </p>
            <div className="d-flex flex-wrap gap-3 mt-4">
              <a href="#menu" className="btn-ember">View the Menu</a>
              <a href="#reserve" className="btn-outline-bone">Reserve a Table</a>
            </div>
          </div>
        </div>
      </div>
      <div className="scroll-cue">
        <span>Scroll</span>
        <div className="line"></div>
      </div>
    </header>
  );
}

function Philosophy() {
  return (
    <section className="philosophy" id="hearth">
      <div className="container">
        <div className="row align-items-center g-5">
          <div className="col-lg-5">
            <div className="wood-panel">
              <div className="tag"><i className="bi bi-fire"></i> Live coals, 900°F</div>
            </div>
          </div>
          <div className="col-lg-7">
            <div className="eyebrow">The Hearth</div>
            <h2 className="heading-2">One fire. No shortcuts.</h2>
            <p className="mt-4" style={{maxWidth: "34rem", lineHeight: 1.7, color: "#4a4238"}}>
              There's no gas range in this kitchen. Everything that leaves it — the bread,
              the vegetables, the whole fish, the dry-aged beef — passes over the same bed
              of oak and apple coals. It's slower than a stovetop and far less forgiving,
              which is exactly the point: fire tells you the truth about an ingredient.
            </p>
            <ul className="fire-facts">
              {FIRE_FACTS.map((f, i) => (
                <li key={i}>
                  <i className={"bi " + f.icon}></i>
                  <span>{f.text}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>
      </div>
    </section>
  );
}

function Menu() {
  const categories = Object.keys(MENU);
  const [active, setActive] = useState(categories[1]);

  return (
    <section className="menu-section" id="menu">
      <div className="container">
        <div className="eyebrow on-dark">The Menu</div>
        <h2 className="heading-2 on-dark">Tonight's fire</h2>
        <p className="menu-note">
          The menu shifts with the season and the wood pile — this is a recent evening.
        </p>

        <div className="menu-pills" role="tablist">
          {categories.map(cat => (
            <button
              key={cat}
              className={"menu-pill" + (active === cat ? " active" : "")}
              onClick={() => setActive(cat)}
              role="tab"
              aria-selected={active === cat}
            >
              {cat}
            </button>
          ))}
        </div>

        <div className="row">
          <div className="col-lg-9">
            {MENU[active].map((item, i) => (
              <div className="menu-item" key={i}>
                <div>
                  <span className="menu-item-name">{item.name}</span>
                  <span className="menu-item-desc">{item.desc}</span>
                </div>
                <div className="menu-item-dots"></div>
                <div className="menu-item-price">{item.price}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function Room() {
  const rooms = [
    { cls: "room-1", label: "The Hearth Bar", sub: "Seats facing the coals" },
    { cls: "room-2", label: "Communal Table", sub: "Long oak, walk-ins welcome" },
    { cls: "room-3", label: "The Patio", sub: "Heat lamps, open late" },
  ];
  return (
    <section id="room">
      <div className="container">
        <div className="eyebrow">The Room</div>
        <h2 className="heading-2">Pull up a seat by the coals</h2>
        <div className="row g-4 mt-4">
          {rooms.map((r, i) => (
            <div className="col-md-4" key={i}>
              <div className={"room-card " + r.cls}>
                <div className="room-label">
                  <span className="eyebrow on-dark">{r.sub}</span>
                  <h4>{r.label}</h4>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Reserve() {
  const [submitted, setSubmitted] = useState(false);
  const [form, setForm] = useState({ name: "", date: "", time: "", party: "2", phone: "" });

  const update = (key) => (e) => setForm(f => ({ ...f, [key]: e.target.value }));

  const handleSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
  };

  return (
    <section className="reserve-section" id="reserve">
      <div className="container">
        <div className="row">
          <div className="col-lg-7">
            <div className="eyebrow on-dark">Reserve</div>
            <h2 className="heading-2 on-dark">Reserve a table</h2>
            <p className="mt-3 mb-4" style={{color: "var(--bone-dim)", maxWidth: "32rem"}}>
              For parties of eight or more, call us directly at (555) 340-2210.
              Otherwise, tell us when you'd like to come by the fire.
            </p>

            {submitted ? (
              <div className="confirm-box">
                <i className="bi bi-check-circle"></i>
                <h4 className="mt-3" style={{color: "var(--bone)"}}>Request received</h4>
                <p className="mt-2 mb-0" style={{color: "var(--bone-dim)"}}>
                  We'll call {form.phone || "you"} to confirm within a few hours.
                </p>
              </div>
            ) : (
              <form onSubmit={handleSubmit}>
                <div className="row g-3">
                  <div className="col-md-6">
                    <label className="form-label-dark">Name</label>
                    <input required className="form-control form-control-dark" value={form.name} onChange={update("name")} placeholder="Full name" />
                  </div>
                  <div className="col-md-6">
                    <label className="form-label-dark">Phone</label>
                    <input required className="form-control form-control-dark" value={form.phone} onChange={update("phone")} placeholder="(555) 000-0000" />
                  </div>
                  <div className="col-md-4">
                    <label className="form-label-dark">Date</label>
                    <input required type="date" className="form-control form-control-dark" value={form.date} onChange={update("date")} />
                  </div>
                  <div className="col-md-4">
                    <label className="form-label-dark">Time</label>
                    <input required type="time" className="form-control form-control-dark" value={form.time} onChange={update("time")} />
                  </div>
                  <div className="col-md-4">
                    <label className="form-label-dark">Party size</label>
                    <select className="form-control form-control-dark" value={form.party} onChange={update("party")}>
                      {[1,2,3,4,5,6,7].map(n => <option key={n} value={n}>{n} {n === 1 ? "guest" : "guests"}</option>)}
                    </select>
                  </div>
                  <div className="col-12">
                    <button type="submit" className="btn-ember mt-2">Request reservation</button>
                  </div>
                </div>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer>
      <div className="container">
        <div className="row g-4">
          <div className="col-md-4">
            <h4>Ember &amp; Salt</h4>
            <p>214 Kiln Row<br />Downtown</p>
          </div>
          <div className="col-md-4">
            <h4>Hours</h4>
            <p>Tue – Sun, 5pm – 11pm<br />Closed Monday — the wood needs a day off.</p>
          </div>
          <div className="col-md-4">
            <h4>Follow</h4>
            <div>
              <a className="social" href="#"><i className="bi bi-instagram"></i></a>
              <a className="social" href="#"><i className="bi bi-facebook"></i></a>
              <a className="social" href="#"><i className="bi bi-envelope"></i></a>
            </div>
          </div>
        </div>
        <div className="footer-rule"></div>
        <div className="d-flex flex-wrap justify-content-between footer-fine">
          <span>© 2026 Ember &amp; Salt</span>
          <span>(555) 340-2210</span>
        </div>
      </div>
    </footer>
  );
}

function App() {
  return (
    <React.Fragment>
      <Nav />
      <Hero />
      <Philosophy />
      <Menu />
      <Room />
      <Reserve />
      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
