<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ember & Salt — Wood-Fired Kitchen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">

<style>
  :root{
    --charcoal: #17140F;
    --charcoal-2: #211C16;
    --charcoal-3: #2B241C;
    --bone: #F3ECE1;
    --bone-dim: #C9BFAF;
    --ember: #E2632B;
    --ember-light: #F2905C;
    --olive: #767955;
    --gold-ash: #C9A66B;
    --display: 'Fraunces', serif;
    --body: 'Work Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; }

  html{ scroll-behavior: smooth; }

  body{
    background: var(--bone);
    color: var(--charcoal);
    font-family: var(--body);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  h1,h2,h3,h4{
    font-family: var(--display);
    font-optical-sizing: auto;
    margin: 0;
  }

  a{ text-decoration: none; }

  .eyebrow{
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ember);
  }

  .eyebrow.on-dark{ color: var(--ember-light); }

  /* ---------- NAVBAR ---------- */
  .site-nav{
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 22px 0;
    background: transparent;
    transition: background 0.35s ease, padding 0.35s ease, box-shadow 0.35s ease;
  }
  .site-nav.scrolled{
    background: rgba(23,20,15,0.94);
    padding: 12px 0;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    backdrop-filter: blur(6px);
  }
  .brand-mark{
    font-family: var(--display);
    font-weight: 600;
    font-size: 1.35rem;
    color: var(--bone);
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark i{ color: var(--ember); font-size: 1.1rem; }
  .nav-links a{
    font-family: var(--mono);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--bone-dim);
    margin-left: 30px;
    transition: color 0.2s ease;
    white-space: nowrap;
  }
  .nav-links a:hover{ color: var(--ember-light); }
  .nav-toggle{
    background: none;
    border: 1px solid var(--bone-dim);
    color: var(--bone);
    width: 40px; height: 40px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .mobile-panel{
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
    background: rgba(23,20,15,0.98);
  }
  .mobile-panel.open{ max-height: 320px; }
  .mobile-panel a{
    display: block;
    padding: 14px 24px;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--bone-dim);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* ---------- HERO ---------- */
  .hero{
    position: relative;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 110%, #3a2414 0%, var(--charcoal) 55%, #100e0a 100%);
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .hero-glow{
    position: absolute;
    bottom: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 120%;
    height: 60%;
    background: radial-gradient(ellipse at center, rgba(226,99,43,0.35) 0%, rgba(226,99,43,0) 65%);
    filter: blur(10px);
    pointer-events: none;
    animation: emberPulse 6s ease-in-out infinite;
  }
  @keyframes emberPulse{
    0%,100%{ opacity: 0.7; }
    50%{ opacity: 1; }
  }
  .ember-particle{
    position: absolute;
    bottom: -10px;
    border-radius: 50%;
    background: var(--ember-light);
    box-shadow: 0 0 6px 1px rgba(242,144,92,0.8);
    animation-name: rise;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
    pointer-events: none;
  }
  @keyframes rise{
    0%{ transform: translate(0,0); opacity: 0; }
    8%{ opacity: 1; }
    50%{ transform: translate(12px,-52vh); }
    100%{ transform: translate(-8px,-102vh); opacity: 0; }
  }
  .hero-content{ position: relative; z-index: 2; }
  .hero h1{
    color: var(--bone);
    font-size: clamp(2.6rem, 6vw, 5.2rem);
    line-height: 1.04;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .hero h1 em{
    font-style: italic;
    color: var(--ember-light);
    font-weight: 500;
  }
  .hero p.lede{
    color: var(--bone-dim);
    font-size: 1.08rem;
    max-width: 34rem;
    margin-top: 24px;
    line-height: 1.6;
  }
  .btn-ember{
    background: var(--ember);
    border: 1px solid var(--ember);
    color: var(--charcoal);
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 26px;
    border-radius: 3px;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .btn-ember:hover{ background: var(--ember-light); color: var(--charcoal); }
  .btn-outline-bone{
    background: transparent;
    border: 1px solid var(--bone-dim);
    color: var(--bone);
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 26px;
    border-radius: 3px;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .btn-outline-bone:hover{ border-color: var(--ember-light); color: var(--ember-light); }

  .scroll-cue{
    position: absolute;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    color: var(--bone-dim);
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .scroll-cue .line{ width: 1px; height: 26px; background: var(--bone-dim); animation: pulseLine 2s ease-in-out infinite; }
  @keyframes pulseLine{ 0%,100%{ opacity:0.3; } 50%{ opacity:1; } }

  /* ---------- SECTIONS GENERAL ---------- */
  section{ padding: 110px 0; }
  .section-tight{ padding: 90px 0; }

  .heading-2{
    font-size: clamp(2rem, 3.4vw, 2.9rem);
    font-weight: 500;
    color: var(--charcoal);
    margin-top: 10px;
  }
  .heading-2.on-dark{ color: var(--bone); }

  /* ---------- PHILOSOPHY ---------- */
  .philosophy{ background: var(--bone); }
  .wood-panel{
    aspect-ratio: 4/5;
    border-radius: 4px;
    background:
      repeating-linear-gradient(115deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 2px, transparent 2px, transparent 26px),
      linear-gradient(160deg, #4a2f1c 0%, #2c1c10 60%, #1c130b 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
  }
  .wood-panel::after{
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 100%, rgba(226,99,43,0.4), transparent 60%);
  }
  .wood-panel .tag{
    position: relative;
    z-index: 2;
    margin: 24px;
    color: var(--bone);
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fire-facts{ list-style: none; padding: 0; margin: 30px 0 0; }
  .fire-facts li{
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-top: 1px solid rgba(0,0,0,0.1);
    font-size: 0.98rem;
    color: #4a4238;
  }
  .fire-facts li:last-child{ border-bottom: 1px solid rgba(0,0,0,0.1); }
  .fire-facts i{ color: var(--ember); font-size: 1.05rem; margin-top: 2px; }

  /* ---------- MENU ---------- */
  .menu-section{ background: var(--charcoal); }
  .menu-pills{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 36px 0 44px;
  }
  .menu-pill{
    font-family: var(--mono);
    font-size: 0.76rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--bone-dim);
    background: transparent;
    border: 1px solid rgba(243,236,225,0.2);
    padding: 9px 18px;
    border-radius: 30px;
    transition: all 0.2s ease;
  }
  .menu-pill.active, .menu-pill:hover{
    color: var(--charcoal);
    background: var(--ember-light);
    border-color: var(--ember-light);
  }
  .menu-item{
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 22px 0;
    border-top: 1px solid rgba(243,236,225,0.12);
  }
  .menu-item:last-child{ border-bottom: 1px solid rgba(243,236,225,0.12); }
  .menu-item-name{
    font-family: var(--display);
    font-size: 1.18rem;
    color: var(--bone);
    white-space: nowrap;
  }
  .menu-item-dots{
    flex: 1 1 auto;
    border-bottom: 1px dotted rgba(243,236,225,0.25);
    margin-bottom: 6px;
    min-width: 16px;
  }
  .menu-item-price{
    font-family: var(--mono);
    font-size: 1rem;
    color: var(--ember-light);
    white-space: nowrap;
  }
  .menu-item-desc{
    font-size: 0.86rem;
    color: var(--bone-dim);
    font-style: italic;
    display: block;
    margin-top: 4px;
  }
  .menu-note{
    color: var(--bone-dim);
    font-size: 0.9rem;
    margin-top: -8px;
    max-width: 36rem;
  }

  /* ---------- ROOM ---------- */
  .room-card{
    aspect-ratio: 1/1;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    padding: 20px;
  }
  .room-card::before{ content:""; position:absolute; inset:0; opacity:0.9; }
  .room-1::before{ background-image: url('bar.jpg');background-size: cover;
            background-position: center; }
  .room-2::before{ background-image: url('table.jpg');background-size: cover;
            background-position: center; }
  .room-3::before{ background-image: url('room.jpg');background-size: cover;
            background-position: center; }
  .room-card .room-label{
    position: relative; z-index: 2;
    color: var(--bone);
  }
  .room-label .eyebrow{ display:block; margin-bottom:4px; }
  .room-label h4{ font-size: 1.3rem; color: var(--bone); font-weight: 500; }

  /* ---------- RESERVE ---------- */
  .reserve-section{ background: var(--charcoal-2); }
  .form-control-dark{
    background: var(--charcoal-3);
    border: 1px solid rgba(243,236,225,0.15);
    color: var(--bone);
    font-family: var(--body);
    padding: 12px 14px;
    border-radius: 3px;
  }
  .form-control-dark:focus{
    background: var(--charcoal-3);
    border-color: var(--ember);
    color: var(--bone);
    box-shadow: 0 0 0 3px rgba(226,99,43,0.18);
    outline: none;
  }
  .form-control-dark::placeholder{ color: var(--bone-dim); opacity: 0.6; }
  .form-label-dark{
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bone-dim);
    margin-bottom: 8px;
    display: block;
  }
  .confirm-box{
    border: 1px solid rgba(226,99,43,0.4);
    background: rgba(226,99,43,0.08);
    border-radius: 4px;
    padding: 40px;
    text-align: center;
  }
  .confirm-box i{ font-size: 2rem; color: var(--ember-light); }

  /* ---------- FOOTER ---------- */
  footer{
    background: var(--charcoal);
    padding: 60px 0 30px;
    color: var(--bone-dim);
  }
  footer h4{ color: var(--bone); font-size: 1.1rem; margin-bottom: 14px; }
  footer a.social{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px; height: 38px;
    border: 1px solid rgba(243,236,225,0.2);
    border-radius: 50%;
    color: var(--bone-dim);
    margin-right: 10px;
    transition: all 0.2s ease;
  }
  footer a.social:hover{ color: var(--charcoal); background: var(--ember-light); border-color: var(--ember-light); }
  .footer-rule{ border-top: 1px solid rgba(243,236,225,0.1); margin: 40px 0 20px; }
  .footer-fine{ font-family: var(--mono); font-size: 0.75rem; color: var(--bone-dim); opacity: 0.6; }

  /* focus visibility */
  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--ember-light);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior: auto; }
    .ember-particle, .hero-glow, .scroll-cue .line{ animation: none !important; }
  }

  @media (max-width: 991.98px){
    .nav-links{ display: none; }
  }
  @media (min-width: 992px){
    .nav-toggle-wrap{ display: none; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ---------------- DATA ---------------- */

const NAV_ITEMS = [
  { href: "#hearth", label: "The Hearth" },
  { href: "#menu", label: "Menu" },
  { href: "#room", label: "The Room" },
  { href: "#reserve", label: "Reserve" },
];

const MENU = {
  "To Begin": [
    { name: "Charred Octopus", desc: "white bean purée, salsa verde, lemon", price: "$19" },
    { name: "Burnt Honey Cornbread", desc: "cultured butter, sea salt", price: "$9" },
    { name: "Smoked Beet Tartare", desc: "goat curd, rye crisps", price: "$14" },
  ],
  "From the Hearth": [
    { name: "Whole Roasted Trout", desc: "embered leeks, brown butter", price: "$28" },
    { name: "Dry-Aged Ribeye, 16oz", desc: "bone marrow butter, charred shallot", price: "$52" },
    { name: "Spatchcocked Chicken", desc: "charred lemon, pan jus", price: "$26" },
    { name: "Wood-Fired Mushroom", desc: "hazelnut romesco, herbs — vegetarian", price: "$22" },
  ],
  "Sides": [
    { name: "Ash-Roasted Potatoes", desc: "rosemary salt", price: "$9" },
    { name: "Charred Broccolini", desc: "chili oil, garlic", price: "$10" },
    { name: "Blistered Shishitos", desc: "flaky salt, lime", price: "$8" },
  ],
  "To Finish": [
    { name: "Burnt Basque Cheesecake", desc: "no crust, all edges", price: "$11" },
    { name: "Smoked Chocolate Tart", desc: "sea salt, crème fraîche", price: "$12" },
    { name: "Rosemary Affogato", desc: "vanilla bean, espresso", price: "$8" },
  ],
  "To Drink": [
    { name: "Ember Old Fashioned", desc: "smoked bourbon, orange", price: "$16" },
    { name: "Applewood Negroni", desc: "smoked gin, campari", price: "$15" },
    { name: "Natural Wine, glass", desc: "ask your server what's pouring", price: "$14" },
  ],
};

const FIRE_FACTS = [
  { icon: "bi-tree", text: "Oak and apple wood, sourced within 60 miles" },
  { icon: "bi-sunrise", text: "Hearth lit at 6am, six mornings a week" },
  { icon: "bi-fire", text: "Every dish on the menu touches the coals" },
];

/* ---------------- COMPONENTS ---------------- */

function EmberParticles({ count = 22 }) {
  const particles = useMemo(() => Array.from({ length: count }).map((_, i) => ({
    id: i,
    left: Math.random() * 100,
    size: 2 + Math.random() * 4,
    duration: 5 + Math.random() * 6,
    delay: Math.random() * 8,
  })), [count]);

  return (
    <div aria-hidden="true">
      {particles.map(p => (
        <div
          key={p.id}
          className="ember-particle"
          style={{
            left: p.left + "%",
            width: p.size + "px",
            height: p.size + "px",
            animationDuration: p.duration + "s",
            animationDelay: p.delay + "s",
          }}
        />
      ))}
    </div>
  );
}

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <nav className={"site-nav" + (scrolled ? " scrolled" : "")}>
      <div className="container d-flex align-items-center justify-content-between">
        <a href="p" className="brand-mark">
          <i className="bi bi-fire"></i> Ember &amp; Salt
        </a>
        <div className="nav-links d-flex">
          {NAV_ITEMS.map(item => (
            <a key={item.href} href={item.href}>{item.label}</a>
          ))}
        </div>
        <div className="nav-toggle-wrap">
          <button className="nav-toggle" onClick={() => setOpen(o => !o)} aria-label="Toggle menu">
            <i className={"bi " + (open ? "bi-x-lg" : "bi-list")}></i>
          </button>
        </div>
      </div>
      <div className={"mobile-panel" + (open ? " open" : "")}>
        {NAV_ITEMS.map(item => (
          <a key={item.href} href={item.href} onClick={() => setOpen(false)}>{item.label}</a>
        ))}
      </div>
    </nav>
  );
}

function Hero() {
  return (
    <header className="hero" id="top">
      <div className="hero-glow"></div>
      <EmberParticles />
      <div className="container hero-content">
        <div className="row">
          <div className="col-lg-9">
            <div className="eyebrow on-dark">Wood, Fire, Patience</div>
            <h1 className="mt-3">Cooked over fire,<br /><em>always.</em></h1>
            <p className="lede">
              A hearth-driven kitchen in the heart of downtown — whole animals, live coals,
              and a menu that changes with the wood pile, not the calendar.
            </p>
            <div className="d-flex flex-wrap gap-3 mt-4">
              <a href="#menu" className="btn-ember">View the Menu</a>
              <a href="#reserve" className="btn-outline-bone">Reserve a Table</a>
            </div>
          </div>
        </div>
      </div>
      <div className="scroll-cue">
        <span>Scroll</span>
        <div className="line"></div>
      </div>
    </header>
  );
}

function Philosophy() {
  return (
    <section className="philosophy" id="hearth">
      <div className="container">
        <div className="row align-items-center g-5">
          <div className="col-lg-5">
            <div className="wood-panel">
              <div className="tag"><i className="bi bi-fire"></i> Live coals, 900°F</div>
            </div>
          </div>
          <div className="col-lg-7">
            <div className="eyebrow">The Hearth</div>
            <h2 className="heading-2">One fire. No shortcuts.</h2>
            <p className="mt-4" style={{maxWidth: "34rem", lineHeight: 1.7, color: "#4a4238"}}>
              There's no gas range in this kitchen. Everything that leaves it — the bread,
              the vegetables, the whole fish, the dry-aged beef — passes over the same bed
              of oak and apple coals. It's slower than a stovetop and far less forgiving,
              which is exactly the point: fire tells you the truth about an ingredient.
            </p>
            <ul className="fire-facts">
              {FIRE_FACTS.map((f, i) => (
                <li key={i}>
                  <i className={"bi " + f.icon}></i>
                  <span>{f.text}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>
      </div>
    </section>
  );
}

function Menu() {
  const categories = Object.keys(MENU);
  const [active, setActive] = useState(categories[1]);

  return (
    <section className="menu-section" id="menu">
      <div className="container">
        <div className="eyebrow on-dark">The Menu</div>
        <h2 className="heading-2 on-dark">Tonight's fire</h2>
        <p className="menu-note">
          The menu shifts with the season and the wood pile — this is a recent evening.
        </p>

        <div className="menu-pills" role="tablist">
          {categories.map(cat => (
            <button
              key={cat}
              className={"menu-pill" + (active === cat ? " active" : "")}
              onClick={() => setActive(cat)}
              role="tab"
              aria-selected={active === cat}
            >
              {cat}
            </button>
          ))}
        </div>

        <div className="row">
          <div className="col-lg-9">
            {MENU[active].map((item, i) => (
              <div className="menu-item" key={i}>
                <div>
                  <span className="menu-item-name">{item.name}</span>
                  <span className="menu-item-desc">{item.desc}</span>
                </div>
                <div className="menu-item-dots"></div>
                <div className="menu-item-price">{item.price}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function Room() {
  const rooms = [
    { cls: "room-1", label: "The Hearth Bar", sub: "Seats facing the coals" },
    { cls: "room-2", label: "Communal Table", sub: "Long oak, walk-ins welcome" },
    { cls: "room-3", label: "The Patio", sub: "Heat lamps, open late" },
  ];
  return (
    <section id="room">
      <div className="container">
        <div className="eyebrow">The Room</div>
        <h2 className="heading-2">Pull up a seat by the coals</h2>
        <div className="row g-4 mt-4">
          {rooms.map((r, i) => (
            <div className="col-md-4" key={i}>
              <div className={"room-card " + r.cls}>
                <div className="room-label">
                  <span className="eyebrow on-dark">{r.sub}</span>
                  <h4>{r.label}</h4>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Reserve() {
  const [submitted, setSubmitted] = useState(false);
  const [form, setForm] = useState({ name: "", date: "", time: "", party: "2", phone: "" });

  const update = (key) => (e) => setForm(f => ({ ...f, [key]: e.target.value }));

  const handleSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
  };

  return (
    <section className="reserve-section" id="reserve">
      <div className="container">
        <div className="row">
          <div className="col-lg-7">
            <div className="eyebrow on-dark">Reserve</div>
            <h2 className="heading-2 on-dark">Reserve a table</h2>
            <p className="mt-3 mb-4" style={{color: "var(--bone-dim)", maxWidth: "32rem"}}>
              For parties of eight or more, call us directly at (555) 340-2210.
              Otherwise, tell us when you'd like to come by the fire.
            </p>

            {submitted ? (
              <div className="confirm-box">
                <i className="bi bi-check-circle"></i>
                <h4 className="mt-3" style={{color: "var(--bone)"}}>Request received</h4>
                <p className="mt-2 mb-0" style={{color: "var(--bone-dim)"}}>
                  We'll call {form.phone || "you"} to confirm within a few hours.
                </p>
              </div>
            ) : (
              <form onSubmit={handleSubmit}>
                <div className="row g-3">
                  <div className="col-md-6">
                    <label className="form-label-dark">Name</label>
                    <input required className="form-control form-control-dark" value={form.name} onChange={update("name")} placeholder="Full name" />
                  </div>
                  <div className="col-md-6">
                    <label className="form-label-dark">Phone</label>
                    <input required className="form-control form-control-dark" value={form.phone} onChange={update("phone")} placeholder="(555) 000-0000" />
                  </div>
                  <div className="col-md-4">
                    <label className="form-label-dark">Date</label>
                    <input required type="date" className="form-control form-control-dark" value={form.date} onChange={update("date")} />
                  </div>
                  <div className="col-md-4">
                    <label className="form-label-dark">Time</label>
                    <input required type="time" className="form-control form-control-dark" value={form.time} onChange={update("time")} />
                  </div>
                  <div className="col-md-4">
                    <label className="form-label-dark">Party size</label>
                    <select className="form-control form-control-dark" value={form.party} onChange={update("party")}>
                      {[1,2,3,4,5,6,7].map(n => <option key={n} value={n}>{n} {n === 1 ? "guest" : "guests"}</option>)}
                    </select>
                  </div>
                  <div className="col-12">
                    <button type="submit" className="btn-ember mt-2">Request reservation</button>
                  </div>
                </div>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer>
      <div className="container">
        <div className="row g-4">
          <div className="col-md-4">
            <h4>Ember &amp; Salt</h4>
            <p>214 Kiln Row<br />Downtown</p>
          </div>
          <div className="col-md-4">
            <h4>Hours</h4>
            <p>Tue – Sun, 5pm – 11pm<br />Closed Monday — the wood needs a day off.</p>
          </div>
          <div className="col-md-4">
            <h4>Follow</h4>
            <div>
              <a className="social" href="#"><i className="bi bi-instagram"></i></a>
              <a className="social" href="#"><i className="bi bi-facebook"></i></a>
              <a className="social" href="#"><i className="bi bi-envelope"></i></a>
            </div>
          </div>
        </div>
        <div className="footer-rule"></div>
        <div className="d-flex flex-wrap justify-content-between footer-fine">
          <span>© 2026 Ember &amp; Salt</span>
          <span>(555) 340-2210</span>
        </div>
      </div>
    </footer>
  );
}

function App() {
  return (
    <React.Fragment>
      <Nav />
      <Hero />
      <Philosophy />
      <Menu />
      <Room />
      <Reserve />
      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
